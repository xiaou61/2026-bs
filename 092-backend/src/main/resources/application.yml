server:
  port: 8092

spring:
  application:
    name: kindergarten-management-system-092
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:kindergarten092;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
  redis:
    host: localhost
    port: 6379
    database: 0
  data:
    redis:
      repositories:
        enabled: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.kindergarten.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: h2
  reasonable: true
  support-methods-arguments: true

jwt:
  secret: kindergarten-manage-jwt-secret-2026
  expiration: 86400000
