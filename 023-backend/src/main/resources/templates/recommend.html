<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>智能推荐 - AI智能学习助手</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-2"><i class="fas fa-wand-magic-sparkles me-2 text-primary"></i>智能推荐</h1>
                    <p class="text-muted mb-0">基于学习记录、掌握度和兴趣偏好生成推荐结果</p>
                </div>
                <button class="btn btn-outline-primary" onclick="loadRecommendationData()">
                    <i class="fas fa-rotate me-1"></i>刷新推荐
                </button>
            </div>

            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">推荐课程</h5>
                        </div>
                        <div class="card-body">
                            <div id="recommendedCourses" class="row g-3"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">推荐知识点</h5>
                        </div>
                        <div class="card-body">
                            <div id="recommendedKnowledge" class="d-flex flex-column gap-2"></div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">推荐画像</h5>
                        </div>
                        <div class="card-body">
                            <div id="recommendationProfile" class="small text-muted">正在加载...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            $(document).ready(function() {
                loadRecommendationData();
            });

            function loadRecommendationData() {
                loadRecommendedCourses();
                loadRecommendedKnowledge();
                loadRecommendationProfile();
            }

            function loadRecommendedCourses() {
                $.get('/api/recommendation/courses?limit=6', function(response) {
                    const container = $('#recommendedCourses');
                    if (!response.success || !response.data || response.data.length === 0) {
                        container.html('<div class="col-12 text-muted">暂无推荐课程</div>');
                        return;
                    }

                    let html = '';
                    response.data.forEach(course => {
                        html += `
                            <div class="col-md-6">
                                <div class="card h-100 border-0 bg-light">
                                    <div class="card-body">
                                        <h6 class="card-title">${course.courseName}</h6>
                                        <p class="card-text text-muted small">${course.description || '暂无描述'}</p>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="badge bg-primary">难度 ${course.difficultyLevel || 1}</span>
                                            <a href="/courses/${course.id}" class="btn btn-sm btn-primary">查看详情</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    container.html(html);
                });
            }

            function loadRecommendedKnowledge() {
                $.get('/api/recommendation/knowledge-points?limit=6', function(response) {
                    const container = $('#recommendedKnowledge');
                    if (!response.success || !response.data || response.data.length === 0) {
                        container.html('<div class="text-muted">暂无推荐知识点</div>');
                        return;
                    }

                    let html = '';
                    response.data.forEach(point => {
                        html += `
                            <div class="border rounded p-3 bg-light">
                                <div class="fw-semibold">${point.pointName}</div>
                                <div class="small text-muted">${point.description || '暂无描述'}</div>
                            </div>
                        `;
                    });
                    container.html(html);
                });
            }

            function loadRecommendationProfile() {
                $.get('/api/recommendation/profile', function(response) {
                    const container = $('#recommendationProfile');
                    if (!response.success || !response.data) {
                        container.text('暂无画像数据');
                        return;
                    }

                    const entries = Object.entries(response.data);
                    if (entries.length === 0) {
                        container.text('暂无画像数据');
                        return;
                    }

                    let html = '<div class="d-flex flex-column gap-2">';
                    entries.forEach(([key, value]) => {
                        html += `
                            <div class="d-flex justify-content-between border-bottom pb-2">
                                <span>课程 ${key}</span>
                                <span class="fw-semibold">${(value * 100).toFixed(0)}%</span>
                            </div>
                        `;
                    });
                    html += '</div>';
                    container.html(html);
                });
            }
        </script>
    </div>
</body>
</html>
