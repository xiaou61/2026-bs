server:
  port: 8071

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:bike_system_071;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER,VALUE,TYPE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
  h2:
    console:
      enabled: true
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 500ms

app:
  redis:
    enabled: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bike.entity
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: h2
  reasonable: true
  support-methods-arguments: true

jwt:
  secret: bike-system-secret-key-2024
  expiration: 86400000
