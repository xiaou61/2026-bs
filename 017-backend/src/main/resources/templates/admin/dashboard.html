<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 校园点餐系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%); min-height: 100vh; }
        .stat-card { border: none; border-radius: 18px; box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/index">校园点餐后台</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/index" class="btn btn-outline-secondary btn-sm">返回首页</a>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn">退出登录</button>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="mb-4">
        <h2 class="mb-1">管理后台</h2>
        <p class="text-muted mb-0" id="welcomeText">正在加载统计数据...</p>
    </div>

    <div class="row g-4" id="statsContainer"></div>

    <div class="card stat-card mt-4">
        <div class="card-body p-4">
            <h4 class="mb-3">当前已落地的后台能力</h4>
            <ul class="mb-0 text-muted">
                <li>管理员登录与身份校验</li>
                <li>平台用户 / 商家 / 菜品 / 订单基础统计</li>
                <li>待审核商家数量和交易额概览</li>
            </ul>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
<script>
    function getToken() {
        return localStorage.getItem('token');
    }

    function authHeaders() {
        return { Authorization: getToken() };
    }

    function formatMoney(value) {
        return Number(value || 0).toFixed(2);
    }

    function ensureAdmin() {
        $.ajax({
            url: '/api/auth/info',
            type: 'GET',
            headers: authHeaders(),
            success: function(res) {
                if (res.code !== 200 || res.data.userType !== 'admin') {
                    alert('请先使用管理员账号登录');
                    window.location.href = '/admin/login';
                    return;
                }
                $('#welcomeText').text('欢迎，' + (res.data.profile.realName || res.data.profile.username) + '。以下是平台概览数据。');
                loadStatistics();
            },
            error: function() {
                alert('登录状态已失效，请重新登录');
                window.location.href = '/admin/login';
            }
        });
    }

    function loadStatistics() {
        $.ajax({
            url: '/api/admin/statistics',
            type: 'GET',
            headers: authHeaders(),
            success: function(res) {
                if (res.code !== 200) {
                    $('#statsContainer').html('<div class="col-12"><div class="alert alert-danger">' + res.message + '</div></div>');
                    return;
                }
                const data = res.data;
                const cards = [
                    ['用户数', data.userCount || 0],
                    ['商家数', data.merchantCount || 0],
                    ['营业中商家', data.activeMerchantCount || 0],
                    ['待审核商家', data.pendingAuditCount || 0],
                    ['菜品数', data.dishCount || 0],
                    ['订单数', data.orderCount || 0],
                    ['已完成订单', data.completedOrderCount || 0],
                    ['平台交易额', '¥' + formatMoney(data.totalAmount)]
                ];
                $('#statsContainer').html(cards.map(card => `
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card h-100">
                            <div class="card-body p-4">
                                <div class="text-muted small mb-2">${card[0]}</div>
                                <div class="fs-3 fw-semibold">${card[1]}</div>
                            </div>
                        </div>
                    </div>
                `).join(''));
            },
            error: function(xhr) {
                $('#statsContainer').html('<div class="col-12"><div class="alert alert-danger">' + (xhr.responseJSON?.message || '加载统计失败') + '</div></div>');
            }
        });
    }

    $('#logoutBtn').click(function() {
        localStorage.removeItem('token');
        localStorage.removeItem('userType');
        window.location.href = '/admin/login';
    });

    ensureAdmin();
</script>
</body>
</html>
