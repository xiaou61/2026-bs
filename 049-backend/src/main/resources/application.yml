server:
  port: 8049

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.xiaou: INFO

spring:
  application:
    name: kaoyan-study-platform
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:kaoyan_study;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=COMMENT,USER,VALUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: kaoyan-study-platform-secret-key-2024-very-long-secret-key-for-jwt
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  mybatis:
    db-type: H2
