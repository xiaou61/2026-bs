spring:
  application:
    name: health-management-platform

  datasource:
    url: jdbc:h2:file:./data/health-management;MODE=PostgreSQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      repositories:
        enabled: false

server:
  port: 8080
