server:
  port: 8073

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:hrm_system_073;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
  redis:
    host: localhost
    port: 6379
    database: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hrm.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

pagehelper:
  helper-dialect: h2
  reasonable: true
  support-methods-arguments: true

jwt:
  secret: hrm-system-jwt-secret-key-2024
  expiration: 86400000
