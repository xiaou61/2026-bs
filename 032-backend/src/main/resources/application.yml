server:
  port: 8032
spring:
  datasource:
    url: jdbc:h2:mem:senior_health;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    jdbc:
      repositories:
        enabled: true
    redis:
      repositories:
        enabled: false
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: optional:file:./sql/schema.sql
app:
  jwt:
    secret: senior-health-management-jwt-secret-key-2026
