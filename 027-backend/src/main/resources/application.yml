server:
  port: 8027
  servlet:
    context-path: /

spring:
  application:
    name: hair-salon
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/027-hair-salon;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    username: sa
    password:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

# JWT配置
jwt:
  secret: xiaou-hair-salon-secret-key-2024-very-long-secret
  expiration: 604800000  # 7天，单位毫秒

# 文件上传路径
file:
  upload-path: ./uploads/
  max-size: 10485760  # 10MB
