server:
  port: 8070

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ticket_system_070;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER,VALUE,TYPE,COMMENT;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
  h2:
    console:
      enabled: true
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 500ms

app:
  redis:
    enabled: false
  mybatis-plus:
    db-type: h2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

