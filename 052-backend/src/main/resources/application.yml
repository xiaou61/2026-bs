server:
  port: 8052

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:online_course;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER,COMMENT;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console
  redis:
    host: localhost
    port: 6379
    database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: onlineCourseSecretKey2024
  expiration: 86400000
