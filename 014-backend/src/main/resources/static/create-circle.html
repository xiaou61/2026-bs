<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建圈子 - 校园社团平台</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-people-fill"></i> 校园社团平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="clubs.html">社团广场</a></li>
                    <li class="nav-item"><a class="nav-link" href="activities.html">活动中心</a></li>
                    <li class="nav-item"><a class="nav-link" href="topics.html">话题广场</a></li>
                    <li class="nav-item"><a class="nav-link active" href="circles.html">兴趣圈子</a></li>
                    <li class="nav-item d-none" id="userNav">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle"></i> <span id="username"></span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="profile.html">个人中心</a></li>
                                <li><a class="dropdown-item" href="my-clubs.html">我的社团</a></li>
                                <li><a class="dropdown-item" href="my-activities.html">我的活动</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#" id="logoutBtn">退出登录</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4" style="max-width: 760px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0"><i class="bi bi-stars"></i> 创建圈子</h2>
            <a href="circles.html" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> 返回圈子广场
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form id="createCircleForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">圈子名称</label>
                            <input type="text" class="form-control" id="name" maxlength="100" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">圈子分类</label>
                            <select class="form-select" id="category" required>
                                <option value="">请选择分类</option>
                                <option value="学术">学术</option>
                                <option value="艺术">艺术</option>
                                <option value="运动">运动</option>
                                <option value="科技">科技</option>
                                <option value="公益">公益</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">封面图 URL</label>
                            <input type="url" class="form-control" id="cover" placeholder="可选">
                        </div>
                        <div class="col-12">
                            <label class="form-label">圈子简介</label>
                            <textarea class="form-control" id="description" rows="5" maxlength="1000" required></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="circles.html" class="btn btn-light">取消</a>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="bi bi-check2-circle"></i> 创建圈子
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        $(document).ready(function() {
            if (!utils.requireAuth()) return;

            $('#createCircleForm').on('submit', function(e) {
                e.preventDefault();

                const payload = {
                    name: $('#name').val().trim(),
                    category: $('#category').val(),
                    cover: $('#cover').val().trim() || null,
                    description: $('#description').val().trim()
                };

                $('#submitBtn').prop('disabled', true);

                request.post('/circles', payload)
                    .done(function(res) {
                        if (res.code === 200) {
                            utils.showToast('圈子创建成功');
                            setTimeout(function() {
                                window.location.href = 'circles.html';
                            }, 800);
                        } else {
                            utils.showToast(res.message || '创建失败', 'error');
                        }
                    })
                    .fail(function(xhr) {
                        utils.showToast(xhr.responseJSON?.message || '创建失败，请稍后重试', 'error');
                    })
                    .always(function() {
                        $('#submitBtn').prop('disabled', false);
                    });
            });
        });
    </script>
</body>
</html>
