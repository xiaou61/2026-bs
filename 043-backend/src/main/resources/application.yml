spring:
  application:
    name: pet-boarding-service
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:pet_boarding;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8043

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: pet-boarding-xiaou-secret-key-2026-graduation-project
  expiration: 604800000
  header: Authorization
  prefix: "Bearer "

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  mybatis:
    db-type: H2
