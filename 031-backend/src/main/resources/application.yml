spring:
  application:
    name: ticket-booking-system

  datasource:
    url: jdbc:h2:mem:ticket_booking;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER,MATCH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 8
      connection-timeout: 30000

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      encoding: UTF-8

  jooq:
    sql-dialect: h2

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.xiaou.ticket: DEBUG
    org.jooq: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

jwt:
  secret: ticket-booking-system-secret-key-2025
  expiration: 86400000
