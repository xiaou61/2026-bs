server:
  port: 8075

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:auto_repair_service_075;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
  pagination-db-type: H2

jwt:
  secret: autoRepairAppointmentSecret2026Token
  expiration: 86400000

file:
  upload-path: uploads/


