spring:
  application:
    name: parking-management

  datasource:
    url: jdbc:h2:mem:parking_management;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      encoding: UTF-8
      data-locations: classpath:data-h2.sql

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8040

jwt:
  secret: community-parking-management-system-secret-key-2026
  expiration: 86400000

file:
  upload-dir: ./uploads/parking
  access-url: http://localhost:8040/files
