spring:
  datasource:
    url: jdbc:mysql://localhost:3306/herbal_food?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
