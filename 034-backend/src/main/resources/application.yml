spring:
  application:
    name: snack-warehouse
  datasource:
    url: jdbc:h2:mem:snack_wms;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      repositories:
        enabled: false
  jackson:
    time-zone: Asia/Shanghai
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

jwt:
  secret: snack-warehouse-management-system-secret-key-2026-xiaou-demo
  expireSeconds: 86400

logging:
  level:
    com.xiaou.snack.wms: info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
