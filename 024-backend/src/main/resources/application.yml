server:
  port: 8024

spring:
  application:
    name: 024-pet-adoption
  datasource:
    url: ${PET_ADOPTION_DATASOURCE_URL:jdbc:h2:file:./data/024-pet-adoption-db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${PET_ADOPTION_DATASOURCE_USERNAME:sa}
    password: ${PET_ADOPTION_DATASOURCE_PASSWORD:}
    driver-class-name: ${PET_ADOPTION_DATASOURCE_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: ${PET_ADOPTION_SQL_SCHEMA:classpath:sql/schema-h2.sql}
      data-locations: ${PET_ADOPTION_SQL_DATA:classpath:sql/data-h2.sql}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.xiaou.pet.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.xiaou.pet.mapper: debug
